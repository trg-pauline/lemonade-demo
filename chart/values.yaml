---
# Application image
app:
  image: "quay.io/mouachan/lemonade-chatbot:1.0"

# LLM configuration
# Option 1: Use local model (requires GPU)
# If model is empty and maas is disabled, Llama 3.2 will be deployed locally
model: {}
  # name: my-model
  # endpoint: my-endpoint
  # port: 8080

# Option 2: Use MaaS (Model as a Service) proxy
# Enable this to use an external MaaS endpoint instead of deploying a local model
maas:
  enabled: true
  # REQUIRED: MaaS endpoint, API key, and model must be set in values-secrets.yaml (gitignored)
  # Copy values-secrets.yaml.example to values-secrets.yaml and set your values
  # These values are intentionally empty - you MUST provide them
  endpoint: ""
  api_key: ""
  model: ""

# Detector configuration
# Configure GPU usage and resources for each detector
detectors:
  # IBM HAP Detector (Granite Guardian)
  hap:
    useGpu: false
    resources:
      requests:
        cpu: '1'
        memory: 4Gi
      limits:
        cpu: '2'
        memory: 8Gi

  # Prompt Injection Detector (DeBERTa v3)
  promptInjection:
    useGpu: false
    resources:
      requests:
        cpu: '4'
        memory: 16Gi
      limits:
        cpu: '8'
        memory: 24Gi

# Enable openshift dashboard
metrics:
  dashboard:
    enabled: true # requires cluster-admin privileges to install the dashboard
    odc: false
