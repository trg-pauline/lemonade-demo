---
# LLM configuration
model: {}
  # name: my-model
  # endpoint: my-maas-instance
  # port: 443
  # api_key: my-api-key

# Detector configuration
# Configure GPU usage and resources for each detector
detectors:
  # IBM HAP Detector (Granite Guardian)
  hap:
    useGpu: false
    resources:
      requests:
        cpu: '1'
        memory: 4Gi
      limits:
        cpu: '2'
        memory: 8Gi

  # Prompt Injection Detector (DeBERTa v3)
  promptInjection:
    useGpu: false
    resources:
      requests:
        cpu: '4'
        memory: 16Gi
      limits:
        cpu: '8'
        memory: 24Gi

# Enable openshift dashboard
metrics:
  dashboard:
    enabled: false # requires cluster-admin privileges to install the dashboard
    odc: false
