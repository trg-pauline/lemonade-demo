---
kind: ConfigMap
apiVersion: v1
metadata:
  name: fms-orchestr8-config-nlp
  annotations:
    helm.sh/weight: "0"
data:
  config.yaml: |
    chunkers:
      sentence:
        type: sentence
        service:
            hostname: chunker-service
            port: 8085
    openai: 
      service:
        hostname: {{ .Values.model.endpoint | default "llama-32-predictor" }}
        port: {{ .Values.model.port | default "8080" }}
    detectors:
      regex_competitor:
        type: text_contents
        service:
            hostname: "127.0.0.1"
            port: 8080
        chunker_id: sentence
        default_threshold: 0.5
      hap:
        type: text_contents
        service:
          hostname: guardrails-detector-ibm-hap-predictor
          port: 8000
        chunker_id: sentence
        default_threshold: 0.5
      prompt_injection:
        type: text_contents
        service:
          hostname: prompt-injection-detector-predictor
          port: 8000
        chunker_id: sentence
        default_threshold: 0.5
      language_detection:
        type: text_contents
        service:
          hostname: lingua-detector
          port: 8080
        chunker_id: sentence
        default_threshold: 0.88
